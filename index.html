<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kniha jázd</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png?v=1">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=1">
<link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png?v=1">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=1">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=1">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=1">
<meta name="apple-mobile-web-app-title" content="Kniha jázd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#185FA5">
<!-- PWA manifest (Android „Inštalovať aplikáciu" + iOS Pridať na plochu). start_url bez tokenu je OK —
     token sa drží v localStorage (uloží sa pri prvom otvorení s ?token=…), takže standalone spustenie
     ho má z pamäte. iOS PWA má separátny storage od Safari → ak token chýba, ukáže sa vkladacie pole. -->
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;min-height:100%}
  body{background:radial-gradient(125% 100% at 50% 28%, #2E7BC4 0%, #185FA5 50%, #0c2f52 100%);
    color:#fff;font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px 28px;min-height:100vh;position:relative;overflow:hidden}
  img.logo{width:min(46vw,168px);height:auto;border-radius:26px;
    box-shadow:0 12px 30px rgba(0,0,0,.35);position:relative;z-index:2;margin-bottom:22px}
  h1.title{font-size:23px;font-weight:800;letter-spacing:.3px;margin:0 0 4px;position:relative;z-index:2}
  .sub{font-size:14px;font-weight:600;opacity:.9;letter-spacing:.3px;margin:0 0 28px;position:relative;z-index:2}
  a.btn,button.btn{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;
    background:#fff;color:#185FA5;font-weight:800;font-size:16px;
    text-decoration:none;padding:13px 38px;min-height:46px;border-radius:13px;border:0;
    box-shadow:0 7px 18px rgba(0,0,0,.28);letter-spacing:.3px;cursor:pointer;font-family:inherit}
  a.btn.off{opacity:.45;pointer-events:none}
  .hint{position:absolute;bottom:42px;left:30px;right:30px;z-index:2;font-size:12.5px;opacity:.85;line-height:1.55}
  .hint b{color:#fff}
  .warn{background:rgba(0,0,0,.2);border-radius:12px;padding:14px 16px;position:static;margin-top:18px}
  .tokbox{margin-top:8px;display:flex;gap:8px;flex-direction:column;align-items:center}
  .tokbox input{font-size:16px;padding:12px 14px;border-radius:12px;border:0;width:260px;text-align:center;letter-spacing:1px;color:#16324f}
  .hidden{display:none}
  /* Full-bleed shell — top-level zostáva github.io (standalone bez Safari chrome),
     appka sa renderuje vo fullscreen iframe. iframe = 100%×100%, appka rieši safe-area sama. */
  #appwrap{position:fixed;inset:0;z-index:1000;display:none;background:#185FA5;overflow:hidden}
  #appframe{display:block;border:0;background:#fff;width:100%;height:100%}
  /* SPLASH — auto-ikona + animácia, spinner pod ňou */
  #splash{position:absolute;inset:0;z-index:1;
    background:radial-gradient(120% 95% at 50% 40%, #2E7BC4 0%, #185FA5 52%, #0c2f52 100%);
    color:#fff;transition:opacity .3s;pointer-events:none;overflow:hidden}
  #splash.hide{opacity:0}
  #splash .slogo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(42vw,150px);height:auto;border-radius:24px;box-shadow:0 12px 30px rgba(0,0,0,.35);z-index:2;
    animation:pop .5s ease-out, breathe 3s ease-in-out .5s infinite}
  @keyframes pop{from{opacity:0;transform:translate(-50%,-50%) scale(.86)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.035)}}
  .spin{width:30px;height:30px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;
    border-radius:50%;position:absolute;top:72%;left:50%;margin:-15px 0 0 -15px;z-index:2;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  #splash .sfoot{position:absolute;bottom:46px;left:0;right:0;z-index:2;text-align:center;
    color:rgba(255,255,255,.6);font-size:11px;font-weight:700;letter-spacing:2.5px}
  html.embed,body.embed{overflow:hidden}
</style>
<script>
  // Token-passthrough + zapamätanie. Token sa NIKDY neukladá v repe — len v URL tohto
  // launchera a v localStorage zariadenia (per-user, na origine launchera).
  var BASE = "https://script.google.com/macros/s/AKfycbyd0Ibp1vhVfZ3CoCnBcXcXMTIcurxpjhiB-r3J4u-2kbI9MTOXID8lXkq72cUesKKX/exec";
  var LS_KEY = "kniha_jazd_token";
  function getTokFromUrl(){ var m = location.search.match(/[?&]token=([^&]+)/); return m ? decodeURIComponent(m[1]) : ""; }
  var TOKEN = getTokFromUrl();
  try {
    if (TOKEN) { localStorage.setItem(LS_KEY, TOKEN); }     // ulož pri prvom otvorení s tokenom
    else { TOKEN = localStorage.getItem(LS_KEY) || ""; }     // inak skús zapamätaný
  } catch (e) {}
  function withTok(t){ return BASE + "?token=" + encodeURIComponent(t); }
  var TARGET = TOKEN ? withTok(TOKEN) : BASE;
  // navigator.standalone je iOS-only; Android/desktop Chrome používa display-mode media query.
  function isStandalone() {
    return (window.navigator.standalone === true)
        || !!(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
  }
  // ROBUSTNÁ detekcia — Chrome niekedy nastaví display-mode až PO prvom vyhodnotení v <head>,
  // preto skúšame opakovane (head + DOMContentLoaded + load + krátky interval + display-mode listener).
  // _entered guard = appku do iframe vložíme len RAZ. Spustené z plochy + token → fullscreen iframe shell.
  var _entered = false;
  function enterApp() {
    if (_entered) return;
    if (!TOKEN) { try { TOKEN = localStorage.getItem(LS_KEY) || ""; } catch (e) {} }  // re-read token (istota)
    if (!isStandalone() || !TOKEN) return;
    _entered = true;
    var TGT = withTok(TOKEN);
    document.documentElement.className += " embed";
    function render() {
      document.body.className += " embed";
      var wrap = document.getElementById("appwrap");
      var frame = document.getElementById("appframe");
      var splash = document.getElementById("splash");
      if (!wrap || !frame) return;
      wrap.style.display = "block";
      frame.addEventListener("load", function(){ if (splash) splash.className = "hide"; });
      frame.src = TGT;
    }
    if (document.body) render(); else document.addEventListener("DOMContentLoaded", render);
  }
  enterApp();                                               // pokus hneď (head)
  document.addEventListener("DOMContentLoaded", enterApp);  // po DOM
  window.addEventListener("load", enterApp);                // po full load
  var _tries = 0, _iv = setInterval(function () {           // krátky retry — display-mode môže nabehnúť neskôr
    enterApp();
    if (_entered || ++_tries > 15) clearInterval(_iv);     // ~3 s max
  }, 200);
  if (window.matchMedia) {                                  // ak sa display-mode zmení na standalone
    try { window.matchMedia('(display-mode: standalone)').addEventListener('change', enterApp); } catch (e) {}
  }
  // registruj minimálny SW (passthrough) — Chrome PWA installability. Cesta relatívna (base path).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () { navigator.serviceWorker.register('./sw.js').catch(function () {}); });
  }
</script>
</head>
<body>
  <!-- Standalone + token: fullscreen iframe shell (skrytý kým JS nezistí standalone) -->
  <div id="appwrap">
    <div id="splash">
      <img class="slogo" src="icon-512.png?v=1" alt="Kniha jázd">
      <div class="spin"></div>
      <div class="sfoot">KNIHA&nbsp;&nbsp;JÁZD</div>
    </div>
    <iframe id="appframe" title="Kniha jázd" allow="clipboard-write"></iframe>
  </div>

  <!-- Bežné Safari / standalone bez tokenu: landing page -->
  <img class="logo" src="icon-512.png?v=1" alt="Kniha jázd">
  <h1 class="title">Kniha jázd</h1>
  <p class="sub">Firemné jazdy · import · výkaz</p>

  <a class="btn" id="openBtn" href="#">Otvoriť →</a>

  <div class="hint" id="hint">📲 Pridaj na plochu: ťukni <b>Zdieľať</b> → <b>Pridať na plochu</b> a appka sa otvára na celú obrazovku.</div>

  <!-- Záložné vloženie tokenu (ak by chýbal v URL aj v pamäti — typické pre iOS standalone) -->
  <div class="hint warn hidden" id="tokWarn">
    Zadaj svoj <b>prístupový token</b>. Zapamätá sa na tomto zariadení.
    <div class="tokbox">
      <input id="tokInput" placeholder="prístupový token" autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="btn" id="tokSave">Uložiť a otvoriť →</button>
    </div>
  </div>

  <script>
    document.getElementById('openBtn').href = TARGET;
    if (!TOKEN) {
      // Token chýba (URL aj pamäť) → skry „Otvoriť", ukáž vkladacie pole.
      document.getElementById('openBtn').className = 'btn off';
      document.getElementById('hint').classList.add('hidden');
      document.getElementById('tokWarn').classList.remove('hidden');
      document.getElementById('tokSave').addEventListener('click', function(){
        var t = (document.getElementById('tokInput').value || '').trim();
        if (!t) return;
        try { localStorage.setItem(LS_KEY, t); } catch(e){}
        TOKEN = t;
        // Standalone: NEnaviguj na script.google.com (iOS by vykoplo PWA do Safari) —
        // načítaj appku do iframe a zostaň na github.io = fullscreen. Browser: otvor priamo.
        if (isStandalone()) { enterApp(); }
        else { location.replace(withTok(t)); }
      });
    }
  </script>
</body>
</html>
